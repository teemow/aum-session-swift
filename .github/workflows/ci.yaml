name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build & test (Linux)
    runs-on: ubuntu-latest
    container: swift:6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: swift build

      - name: Test
        run: swift test
